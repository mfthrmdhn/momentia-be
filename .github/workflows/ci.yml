name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run unit tests
        run: go test ./...

  trigger-automation:
    name: Trigger Automation Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()

    steps:
      - name: Dispatch automation tests
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMATION_TRIGGER_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'mfthrmdhn',
              repo: 'momentia-automation',
              event_type: 'be-ci-trigger',
              client_payload: {
                ref: context.ref,
                sha: context.sha,
                run_id: context.runId,
                actor: context.actor,
                event: context.eventName,
                be_repo: 'mfthrmdhn/momentia-be',
                be_branch: context.ref.replace('refs/heads/', ''),
                db_name: 'momentia',
                db_user: 'bapak_kau',
                db_password: 'your_father_head',
                db_port: '5433',
                migration_path: 'internal/db/migrations',
                seed_cmd: 'go run ./cmd/seed',
              }
            });
            console.log('Dispatched automation tests to mfthrmdhn/momentia-automation');
