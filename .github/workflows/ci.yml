name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run unit tests
        run: go test ./...

  automation:
    name: Automation Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()

    env:
      DB_HOST: localhost
      DB_PORT: "5433"
      DB_USER: bapak_kau
      DB_PASSWORD: your_father_head
      DB_NAME: momentia
      DB_SSLMODE: disable
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Checkout automation repo
        uses: actions/checkout@v4
        with:
          repository: mfthrmdhn/momentia-automation
          token: ${{ secrets.AUTOMATION_TRIGGER_TOKEN }}
          path: momentia-automation

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start database
        run: docker compose up -d

      - name: Wait for database to be ready
        run: |
          echo "Waiting for PostgreSQL on port 5433..."
          for i in $(seq 1 10); do
            if pg_isready -h localhost -p 5433 -U bapak_kau > /dev/null 2>&1; then
              echo "Database is ready"
              exit 0
            fi
            echo "Attempt $i/10 - not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "Database failed to start in time"
          exit 1

      - name: Install migrate CLI
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        run: migrate -path internal/db/migrations -database "postgres://bapak_kau:your_father_head@localhost:5433/momentia?sslmode=disable" up

      - name: Seed database
        run: go run ./cmd/seed

      - name: Start Go server
        run: |
          nohup go run ./cmd/api > server.log 2>&1 &
          echo $! > /tmp/server.pid
          sleep 3
          echo "Waiting for backend on port 8080..."
          for i in $(seq 1 5); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Attempt $i/5 - not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Server failed to start. Logs:"
          cat server.log
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: momentia-automation/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: momentia-automation

      - name: Run API tests
        run: npm run test:api
        working-directory: momentia-automation

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: momentia-automation/playwright-report/
          retention-days: 7

      - name: Stop backend services
        if: always()
        run: docker compose down
